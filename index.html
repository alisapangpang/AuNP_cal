<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注射體積計算機</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: #f5f4f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .card {
        background: #fff;
        border-radius: 16px;
        padding: 2rem 2.5rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
      }

      h1 {
        font-size: 15px;
        font-weight: 500;
        color: #999;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 2rem;
      }

      .field {
        margin-bottom: 1.5rem;
      }

      label {
        font-size: 12px;
        color: #aaa;
        display: block;
        margin-bottom: 4px;
        letter-spacing: 0.03em;
      }

      input[type="number"] {
        width: 100%;
        font-size: 32px;
        font-weight: 400;
        color: #111;
        border: none;
        border-bottom: 1.5px solid #e0e0e0;
        background: transparent;
        padding: 4px 0 8px;
        outline: none;
        transition: border-color 0.2s;
        appearance: textfield;
        -moz-appearance: textfield;
      }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
      }
      input[type="number"]:focus {
        border-bottom-color: #111;
      }

      .fixed-val {
        font-size: 32px;
        font-weight: 400;
        color: #ccc;
        padding: 4px 0 8px;
        border-bottom: 1.5px solid #f0f0f0;
      }

      .unit {
        font-size: 13px;
        color: #bbb;
        margin-top: 2px;
      }

      .divider {
        border: none;
        border-top: 1px solid #f0f0f0;
        margin: 2rem 0;
      }

      .result-label {
        font-size: 12px;
        color: #aaa;
        letter-spacing: 0.03em;
        margin-bottom: 4px;
      }

      .result-val {
        font-size: 48px;
        font-weight: 300;
        color: #111;
        line-height: 1;
        letter-spacing: -1px;
        transition: color 0.3s;
      }

      .result-unit {
        font-size: 16px;
        color: #aaa;
        margin-top: 4px;
      }

      .sub-result {
        margin-top: 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .sub-label {
        font-size: 12px;
        color: #bbb;
      }
      .sub-val {
        font-size: 15px;
        color: #888;
        font-weight: 400;
      }

      .msg {
        margin-top: 1.5rem;
        font-size: 12px;
        padding: 10px 14px;
        border-radius: 8px;
        display: none;
      }
      .msg.warn {
        background: #fff8ed;
        color: #b07000;
      }
      .msg.ok {
        background: #f0faf4;
        color: #2a7a4a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>注射體積計算</h1>

      <div class="field">
        <label>小鼠體重</label>
        <input
          type="number"
          id="weight"
          value="27"
          min="1"
          max="100"
          step="0.1"
          oninput="calc()"
        />
        <div class="unit">g</div>
      </div>

      <div class="field">
        <label>Stock 濃度</label>
        <input
          type="number"
          id="conc"
          value="800"
          min="0.001"
          step="any"
          oninput="calc()"
        />
        <div class="unit">ppm &nbsp;(µg/mL)</div>
      </div>

      <div class="field">
        <label>劑量（固定）</label>
        <div class="fixed-val">3</div>
        <div class="unit">mg/kg</div>
      </div>

      <hr class="divider" />

      <div class="result-label">注射體積</div>
      <div class="result-val" id="out-vol">101.3</div>
      <div class="result-unit" id="out-vol-unit">µL</div>

      <div class="sub-result">
        <span class="sub-label">需注射藥量</span>
        <span class="sub-val" id="out-mass">81.00 µg</span>
      </div>

      <div class="msg" id="msg"></div>
    </div>

    <script>
      const DOSE = 3;
      const MAX_ML_PER_KG = 10;

      function calc() {
        const w = parseFloat(document.getElementById("weight").value);
        const conc = parseFloat(document.getElementById("conc").value);
        const volEl = document.getElementById("out-vol");
        const volUnitEl = document.getElementById("out-vol-unit");
        const massEl = document.getElementById("out-mass");
        const msg = document.getElementById("msg");

        if (isNaN(w) || w <= 0) return;

        const massUg = DOSE * w;
        massEl.textContent = massUg.toFixed(2) + " µg";

        if (isNaN(conc) || conc <= 0) {
          volEl.textContent = "—";
          volEl.style.color = "#111";
          volUnitEl.textContent = "µL";
          msg.style.display = "none";
          return;
        }

        const volUL = (massUg / conc) * 1000;
        const maxVolUL = MAX_ML_PER_KG * w;

        if (volUL >= 1000) {
          volEl.textContent = (volUL / 1000).toFixed(3);
          volUnitEl.textContent = "mL";
        } else {
          volEl.textContent = volUL.toFixed(1);
          volUnitEl.textContent = "µL";
        }

        if (volUL > maxVolUL) {
          volEl.style.color = "#c07000";
          msg.className = "msg warn";
          msg.style.display = "block";
          msg.textContent =
            "體積超過尾靜脈建議上限（" +
            maxVolUL.toFixed(0) +
            " µL），建議稀釋 stock。";
        } else {
          volEl.style.color = "#2a7a4a";
          msg.className = "msg ok";
          msg.style.display = "block";
          msg.textContent =
            "注射體積正常（上限 " + maxVolUL.toFixed(0) + " µL）。";
        }
      }

      calc();
    </script>
  </body>
</html>
